<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 100">
  <!-- Arrow shaft (parallelogram) -->
  <path d="M 34,33 L 80,33 L 64,57 L 18,57 Z" fill="#5A5D62"/>
  <!-- Two diagonal speed-line cuts through shaft -->
  <line x1="51" y1="33" x2="43" y2="57" stroke="#000" stroke-width="3"/>
  <line x1="62" y1="33" x2="54" y2="57" stroke="#000" stroke-width="3"/>
  <!-- Arrowhead (downward chevron) -->
  <path d="M 14,60 L 50,97 L 84,60 L 66,60 L 50,80 L 34,60 Z" fill="#5A5D62"/>
  <!-- Play triangle (red, on top) -->
  <polygon points="0,0 68,40 0,78" fill="#DD2D38"/>
  <!-- Text -->
  <text x="96" y="58" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="34" font-weight="600" fill="#8a8d94" letter-spacing="0.5">iplayer-arr</text>
</svg>
