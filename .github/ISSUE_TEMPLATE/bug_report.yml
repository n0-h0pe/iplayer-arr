name: Bug report
description: Something isn't working as expected
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. **All fields below are optional** - fill in what you can and leave blank what you can't. A report with some data is more useful than no report at all.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the behaviour you observed
      placeholder: |
        e.g. "Sonarr searched for Doctor Who S01E02 and iplayer-arr returned the wrong episode"
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: e.g. "Sonarr should have received the classic series episode"
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: iplayer-arr version
      placeholder: e.g. v1.1.1, or "latest" if you're on the :latest tag
    validations:
      required: false

  - type: dropdown
    id: install-source
    attributes:
      label: Docker image source
      options:
        - GHCR (ghcr.io/will-luck/iplayer-arr)
        - Docker Hub (willluck/iplayer-arr)
        - Built from source
        - Other
        - Not sure
    validations:
      required: false

  - type: input
    id: host-os
    attributes:
      label: Host OS / platform
      placeholder: e.g. Ubuntu 22.04, Unraid 6.12, TrueNAS Scale, Synology DSM
    validations:
      required: false

  - type: input
    id: sonarr-version
    attributes:
      label: Sonarr version (if relevant)
      placeholder: e.g. v4.0.17
    validations:
      required: false

  - type: input
    id: show-name
    attributes:
      label: BBC show(s) affected
      description: Which BBC show(s) were you trying to download? Helps us reproduce.
      placeholder: e.g. "Doctor Who, Match of the Day, EastEnders"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Paste any relevant iplayer-arr logs (from Docker or the web UI's Logs page) or Sonarr logs. You can drag-and-drop log files too.
      render: text
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Anything else that might help - screenshots, configuration snippets, reproduction steps
    validations:
      required: false
