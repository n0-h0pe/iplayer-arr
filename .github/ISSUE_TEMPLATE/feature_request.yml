name: Feature request
description: Suggest an idea or enhancement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an idea! **All fields below are optional** - describe what you can and leave the rest blank.

  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do that iplayer-arr doesn't currently support?
    validations:
      required: false

  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
    validations:
      required: false
