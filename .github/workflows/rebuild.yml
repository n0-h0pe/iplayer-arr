name: Rebuild on Base Image Update

on:
  schedule:
    - cron: '17 4 * * 0'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force rebuild even if base image unchanged'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  check-and-rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get current base image digest
        id: current
        run: |
          docker buildx create --use --name inspect-builder
          DIGEST=$(docker buildx imagetools inspect ghcr.io/hotio/base:alpinevpn --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Current base digest: $DIGEST"
          docker buildx rm inspect-builder

      - name: Load last-seen digest
        id: stored
        run: |
          if [ -f .github/base-image-digest ]; then
            STORED=$(cat .github/base-image-digest)
          else
            STORED="none"
          fi
          echo "digest=$STORED" >> "$GITHUB_OUTPUT"
          echo "Stored base digest: $STORED"

      - name: Check if rebuild needed
        id: check
        run: |
          FORCE="${{ inputs.force }}"
          if [ "$FORCE" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Forced rebuild requested"
          elif [ "${{ steps.current.outputs.digest }}" != "${{ steps.stored.outputs.digest }}" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Base image changed -- rebuilding"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Base image unchanged -- skipping"
          fi

      - name: Generate version and build date
        if: steps.check.outputs.changed == 'true'
        id: version
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "dev")
          DATE=$(date -u +%Y%m%d)
          VERSION="${TAG}+rebuild.${DATE}"
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_date=$BUILD_DATE" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION, Build date: $BUILD_DATE"

      - uses: docker/setup-qemu-action@v3
        if: steps.check.outputs.changed == 'true'

      - uses: docker/setup-buildx-action@v3
        if: steps.check.outputs.changed == 'true'

      - uses: docker/login-action@v3
        if: steps.check.outputs.changed == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        if: steps.check.outputs.changed == 'true'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        if: steps.check.outputs.changed == 'true'
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/will-luck/iplayer-arr:latest
            docker.io/willluck/iplayer-arr:latest
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            BUILD_DATE=${{ steps.version.outputs.build_date }}
          cache-from: type=gha,scope=rebuild
          cache-to: type=gha,scope=rebuild,mode=max

      - name: Update stored digest
        if: steps.check.outputs.changed == 'true' && steps.current.outputs.digest != steps.stored.outputs.digest
        run: |
          echo -n "${{ steps.current.outputs.digest }}" > .github/base-image-digest
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/base-image-digest
          git commit -m "ci: update base image digest [skip ci]"
          git push
